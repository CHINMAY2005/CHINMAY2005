name: Update Profile README

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every single day at midnight UTC
  workflow_dispatch: # Allows you to click a button and run it manually anytime

permissions:
  contents: write # Gives the action permission to commit changes back to your repo

jobs:
  refresh-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Update Script
        run: python .github/scripts/update_readme.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if changes were actually made to prevent infinite workflow loops
          git diff-index --quiet HEAD || git commit -m "chore: automated refresh of terminal metrics"
          git push
